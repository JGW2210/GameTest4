<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WORDLOOM — a Lexicon Arcanum prototype</title>
<link rel="stylesheet" href="css/loom.css?v=5">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪡</text></svg>">
</head>
<body>
<script>
/* Boot failsafe: if anything dies before the title renders, say so visibly. */
(function () {
  function fail(msg) {
    var s = document.getElementById('screen');
    if (!s || s.dataset.booted) return;
    s.innerHTML = '<div style="padding:36px 16px;text-align:center">' +
      '<h2 style="font-variant:small-caps">\uD83D\uDD6F The loom failed to wake</h2>' +
      '<p style="margin:12px 0;font-size:14px">' + msg + '</p>' +
      '<p style="font-size:12.5px;opacity:0.7;margin-bottom:14px">This is usually a stale cached page mixing old and new files.</p>' +
      '<button style="padding:10px 22px;font-size:16px;cursor:pointer" ' +
      'onclick="location.href=location.pathname+\'?fresh=\'+Date.now()">\u267B Reload fresh</button></div>';
  }
  window.__loomFail = fail;
  window.addEventListener('error', function (ev) {
    fail((ev.message || 'unknown error') + '<br><span style="opacity:0.6">' +
      String(ev.filename || '').split('/').pop() + ':' + (ev.lineno || '?') + '</span>');
  });
})();
</script>
<div id="app">
  <header id="topbar">
    <span class="brand">🪡 WORDLOOM</span>
    <span id="hud"></span>
  </header>
  <main id="screen"></main>
</div>
<div id="toast"></div>
<script src="vendor/three.min.js"></script>
<script src="js/data/morphology.js?v=5"></script>
<script src="js/data/foes.js?v=5"></script>
<script src="js/data/classes.js?v=5"></script>
<script src="js/data/events.js?v=5"></script>
<script src="js/engine.js?v=5"></script>
<script src="js/save.js?v=5"></script>
<script src="js/fx.js?v=5"></script>
<script src="js/gl-scene.js?v=5"></script>
<script src="js/gl-fx.js?v=5"></script>
<script src="js/main.js?v=5"></script>
<script>
if (!window.Morph || !window.Loom || !window.LoomSave || !window.Weavers || !window.LoomEvents ||
    !document.getElementById('screen').dataset.booted) {
  window.__loomFail('Some of the loom\'s files did not load.');
}
</script>
<noscript><div style="color:#e8d9b0;text-align:center;padding:30px">WORDLOOM needs JavaScript to weave.</div></noscript>
</body>
</html>
